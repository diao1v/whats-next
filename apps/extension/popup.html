<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --page: #fdf8f3; --paper: #fffdfb; --line: #f0e3d4; --ink: #42342a;
      --muted: #8a7763; --accent: #d97706; --accent-deep: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      width: 320px; margin: 0; padding: 14px;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--page); color: var(--ink);
    }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .brand { display: flex; align-items: center; gap: 8px; }
    .logo {
      width: 26px; height: 26px; border-radius: 8px; background: var(--accent);
      color: var(--paper); font-weight: 800; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
    }
    .wordmark { font-weight: 800; font-size: 15px; }
    .icon-btn {
      border: 0; background: transparent; color: var(--muted); cursor: pointer;
      padding: 6px; border-radius: 8px; line-height: 0;
    }
    .icon-btn:hover { color: var(--ink); background: #f6ead9; }
    .card {
      background: var(--paper); border: 1px solid var(--line);
      border-radius: 14px; padding: 14px; box-shadow: 0 2px 8px rgba(180,120,60,.08);
    }
    .page-from { font-size: 12px; color: var(--muted); margin: 0 0 10px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn {
      width: 100%; border: 0; border-radius: 10px; padding: 10px 14px;
      font-weight: 700; font-size: 14px; cursor: pointer;
      background: var(--accent); color: var(--paper);
    }
    .btn:hover { background: var(--accent-deep); }
    .btn:disabled { opacity: .55; cursor: default; }
    .btn.secondary { background: var(--ink); }
    .status { margin-top: 10px; font-size: 12.5px; color: var(--muted); min-height: 16px; }
    .status.ok { color: #15803d; } .status.err { color: #b91c1c; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
    .field { display: flex; gap: 6px; }
    input {
      width: 100%; padding: 8px 10px; border: 1px solid var(--line);
      border-radius: 9px; background: var(--paper); color: var(--ink); font-size: 13px;
    }
    input:focus { outline: 2px solid rgba(217,119,6,.35); outline-offset: 0; }
    .row { display: flex; gap: 8px; margin-top: 12px; }
    .row .btn { width: auto; flex: 1; }
    .hidden { display: none; }
    .settings-title { font-weight: 700; font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand"><span class="logo">W</span><span class="wordmark">What's Next</span></div>
    <button id="toggleSettings" class="icon-btn" aria-label="Settings" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <!-- Capture view -->
  <div id="captureView" class="card">
    <p id="pageFrom" class="page-from">Capturing from this tab</p>
    <button id="capture" class="btn">Capture this job</button>
    <div id="status" class="status"></div>
  </div>

  <!-- Settings view -->
  <div id="settingsView" class="card hidden">
    <div class="settings-title">Connection</div>
    <label for="apiUrl">API URL</label>
    <input id="apiUrl" placeholder="https://whats-next-api…workers.dev" />
    <label for="token">API token</label>
    <div class="field">
      <input id="token" type="password" placeholder="wn_…" />
      <button id="reveal" class="icon-btn" aria-label="Show token" title="Show token">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="row">
      <button id="save" class="btn">Save</button>
      <button id="test" class="btn secondary">Test connection</button>
    </div>
    <div id="settingsMsg" class="status"></div>
  </div>

  <script type="module" src="/src/popup.ts"></script>
</body>
</html>
