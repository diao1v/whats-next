name = "whats-next-api"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "whats-next-db"
database_id = "7beea65f-bf04-456b-ac46-3b7d55b8fcfa"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "RAW_BUCKET"
bucket_name = "whats-next-raw"

[browser]
binding = "BROWSER"

[vars]
ALLOWED_ORIGIN = "http://localhost:5173,https://whats-next-web.tuicaodanad.workers.dev"
EXTRACTION_MODEL = "google/gemma-4-31b-it:free,qwen/qwen3-next-80b-a3b-instruct:free,deepseek/deepseek-v4-flash"
# AI_GATEWAY_URL is a secret (it contains the account id) — set via `wrangler secret put`
# (or `.dev.vars` for local dev). It is intentionally NOT committed here.
# Secrets (set via `wrangler secret put`): CLERK_SECRET_KEY, OPENROUTER_API_KEY, AI_GATEWAY_URL
